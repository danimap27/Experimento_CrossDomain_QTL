# =============================================================================
# Cross-Domain QTL — manager.py config
# Sweep: 3 noise profiles × 5 seeds × full pipeline (Exp1+2+3) = 15 runs.
# =============================================================================

experiment_name: "crossdomain_qtl"
conda_env: "qtl"
slurm_script: "core/slurm_generic.sh"

output_dir: "./results"
tables_dir: "./paper/tables"

# ── Sweep dimensions ─────────────────────────────────────────────────────────
seeds: [0, 1, 2, 3, 4]

# Each "model" is a noise profile. runner.py looks up the noise params via
# quantum_net.get_noise_profile(name).
models:
  - name: "ideal"
    label: "Ideal (noiseless)"
  - name: "heron_r2"
    label: "IBM Heron r2"
  - name: "legacy_nisq"
    label: "Legacy NISQ"

# Fixed hyperparameters
epochs: 10
lr: 0.05

# ── Phases ───────────────────────────────────────────────────────────────────
# Three phases (one per noise profile) so they can be launched/monitored
# independently or chained via [F] Full Pipeline.
phases:
  - id: "1"
    name: "ideal"
    file: "cmds_1_ideal.txt"
    description: "Phase 1 — 5 seeds, noiseless"
    filters:
      model: "ideal"

  - id: "2"
    name: "heron_r2"
    file: "cmds_2_heron_r2.txt"
    description: "Phase 2 — 5 seeds, IBM Heron r2 noise"
    filters:
      model: "heron_r2"

  - id: "3"
    name: "legacy_nisq"
    file: "cmds_3_legacy_nisq.txt"
    description: "Phase 3 — 5 seeds, legacy NISQ noise (~10x errors)"
    filters:
      model: "legacy_nisq"

expected_runs: 15

# ── Aggregation hooks (read by monitor) ──────────────────────────────────────
results:
  file_pattern: "*.csv"
  group_by: ["model"]
  metrics: ["drop_qtl", "drop_base", "qtl_acc", "scr_acc"]

# ── LaTeX labels ─────────────────────────────────────────────────────────────
labels:
  model:
    ideal:       "\\textsc{Ideal}"
    heron_r2:    "\\textsc{Heron r2}"
    legacy_nisq: "\\textsc{Legacy NISQ}"

# ── LaTeX tables ─────────────────────────────────────────────────────────────
tables:
  - name: "tab_forgetting"
    caption: "Experiment 1 — catastrophic forgetting drop (lower is better)."
    label: "tab:forgetting"
    rows: "model"
    metrics:
      - column: "drop_base"
        label: "Baseline Drop (\\%)"
        pct: false
      - column: "drop_qtl"
        label: "QTL Drop (\\%)"
        pct: false

  - name: "tab_topology"
    caption: "Experiment 2 — Task A retained accuracy (\\%) per ansatz."
    label: "tab:topology"
    rows: "model"
    metrics:
      - column: "acc_A_ansatz_A"
        label: "Strongly Ent."
        pct: false
      - column: "acc_A_ansatz_B"
        label: "Basic Ent."
        pct: false
      - column: "acc_A_ansatz_C"
        label: "TTN"
        pct: false

  - name: "tab_crossdomain"
    caption: "Experiment 3 — target accuracy (\\%) under cross-domain priors."
    label: "tab:crossdomain"
    rows: "model"
    metrics:
      - column: "scr_acc"
        label: "Scratch"
        pct: false
      - column: "qtl_acc"
        label: "QTL-Syn"
        pct: false
      - column: "mob_qtl_acc"
        label: "QTL-Mob"
        pct: false
